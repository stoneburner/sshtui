name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: sshtui-x86_64-unknown-linux-gnu
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            artifact: sshtui-aarch64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: sshtui-aarch64-apple-darwin
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          sed 's/^version = .*/version = "'"$VERSION"'"/' Cargo.toml > Cargo.toml.tmp && mv Cargo.toml.tmp Cargo.toml
          grep '^version = ' Cargo.toml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Build (Linux x86_64)
        if: matrix.os == 'ubuntu-22.04' && matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (Linux aarch64 with cross)
        if: matrix.os == 'ubuntu-22.04' && matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          cargo install cross
          cross build --target ${{ matrix.target }} --release

      - name: Build (macOS)
        if: matrix.os != 'ubuntu-22.04'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Import signing certificate (macOS)
        if: matrix.os != 'ubuntu-22.04'
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          echo "$MACOS_CERTIFICATE_P12_BASE64" | base64 -d > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Sign binary (macOS)
        if: matrix.os != 'ubuntu-22.04'
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          codesign --force --options runtime --sign "$MACOS_SIGNING_IDENTITY" \
            target/${{ matrix.target }}/release/sshtui
          codesign --verify --deep --strict -v target/${{ matrix.target }}/release/sshtui

      - name: Prepare archive (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/sshtui staging/
          tar czvf ${{ matrix.artifact }}.tar.gz -C staging sshtui

      - name: Prepare archive (macOS)
        if: matrix.os != 'ubuntu-22.04'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/sshtui staging/
          tar czvf ${{ matrix.artifact }}.tar.gz -C staging sshtui
          (cd staging && zip -r ../${{ matrix.artifact }}.zip sshtui)

      - name: Notarize (macOS)
        if: matrix.os != 'ubuntu-22.04'
        env:
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_KEY: ${{ secrets.APPLE_NOTARY_KEY }}
        run: |
          echo "$APPLE_NOTARY_KEY" > notary_key.p8
          xcrun notarytool submit ${{ matrix.artifact }}.zip \
            --key-id "$APPLE_NOTARY_KEY_ID" \
            --issuer "$APPLE_NOTARY_ISSUER_ID" \
            --key notary_key.p8 \
            --wait
          rm notary_key.p8

      - name: Upload artifact (Linux)
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

      - name: Upload artifact (macOS)
        if: matrix.os != 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/*/*.tar.gz release/ 2>/dev/null || true
          cp artifacts/*/*.zip release/ 2>/dev/null || true
          ls -la release/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            release/*.tar.gz
            release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version and Formula (version, URLs, SHAs)
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          MACOS_SHA=$(sha256sum release/sshtui-aarch64-apple-darwin.zip 2>/dev/null | cut -d' ' -f1)
          LINUX_X64_SHA=$(sha256sum release/sshtui-x86_64-unknown-linux-gnu.tar.gz 2>/dev/null | cut -d' ' -f1)
          LINUX_ARM64_SHA=$(sha256sum release/sshtui-aarch64-unknown-linux-gnu.tar.gz 2>/dev/null | cut -d' ' -f1)
          [ -z "$MACOS_SHA" ] && [ -z "$LINUX_X64_SHA" ] && [ -z "$LINUX_ARM64_SHA" ] && echo "No release assets, skipping" && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout ${{ github.event.repository.default_branch }}
          git pull origin ${{ github.event.repository.default_branch }}
          sed -i 's/^version = .*/version = "'"$VERSION"'"/' Cargo.toml
          sed -i 's/^  version "[^"]*"/  version "'"$VERSION"'"/' Formula/sshtui.rb
          sed -i 's|/releases/download/v[0-9]*\.[0-9]*\.[0-9]*/|/releases/download/v'"$VERSION"'/|g' Formula/sshtui.rb
          [ -n "$MACOS_SHA" ] && sed -i '/apple-darwin.zip/,/sha256/ s/sha256 "[^"]*"/sha256 "'"$MACOS_SHA"'"/' Formula/sshtui.rb
          [ -n "$LINUX_X64_SHA" ] && sed -i '/x86_64-unknown-linux-gnu.tar.gz/,/sha256/ s/sha256 "[^"]*"/sha256 "'"$LINUX_X64_SHA"'"/' Formula/sshtui.rb
          [ -n "$LINUX_ARM64_SHA" ] && sed -i '/aarch64-unknown-linux-gnu.tar.gz/,/sha256/ s/sha256 "[^"]*"/sha256 "'"$LINUX_ARM64_SHA"'"/' Formula/sshtui.rb
          if git diff --quiet Cargo.toml Formula/sshtui.rb; then
            echo "No version or Formula changes"
          else
            git add Cargo.toml Formula/sshtui.rb
            git commit -m "Release ${{ github.ref_name }}"
            git push origin ${{ github.event.repository.default_branch }}
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
